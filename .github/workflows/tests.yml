name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Run the suite in the project's Docker image (Python + deps + gcc), the
      # same environment used locally, so the compile and golden tests build
      # the C library and load it via ctypes with no host setup.
      - name: Run tests
        run: docker compose run --rm tests

name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Deps the current test suite needs (numpy/scipy for the pipeline,
      # matplotlib for the validation plots). Expand as more tests are added
      # (e.g. cffi + a C compiler for golden tests).
      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy scipy matplotlib pytest

      - name: Run tests
        run: pytest -v
